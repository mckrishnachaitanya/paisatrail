<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="#FF6B6B"/>

  <!-- Dotted trail arc behind the ₹ -->
  <path d="M 130 370 Q 180 260 256 256 Q 332 252 370 160" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="18" stroke-dasharray="18 22" stroke-linecap="round"/>

  <!-- ₹ symbol, centred -->
  <text x="256" y="320" font-family="Georgia, serif" font-size="240" font-weight="700"
        text-anchor="middle" fill="white">₹</text>

  <!-- Trail end dot -->
  <circle cx="370" cy="160" r="18" fill="rgba(255,255,255,0.55)"/>
  <!-- Trail start dot -->
  <circle cx="130" cy="370" r="14" fill="rgba(255,255,255,0.35)"/>
</svg>
